services:
  backend:
    build:
      context: ./backend
      target: production
    env_file:
      - ./backend/.env
    environment:
      CLIENT_URL: http://localhost:3001
    ports:
      - "8001:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001/api}
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped
