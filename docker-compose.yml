services:
  backend:
    build:
      context: ./backend
      target: dev
    env_file:
      - ./backend/.env
    environment:
      CLIENT_URL: http://localhost:3001
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_BASE_URL: http://localhost:8001/api
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
